server {
    listen 80;
    server_name rakica.dev www.rakica.dev;

    # Transport-level security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve the React SPA static build
    root /var/www/personal_presentation/client/dist;
    index index.html;

    # Client-side routing: non-asset requests fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed assets: aggressive long-term caching
    location ~* \.(?:js|css|woff2?|ico|png|jpg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Reverse proxy: all /api/* traffic → Express on port 3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Deny dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
# Certbot will add the SSL server block and HTTP→HTTPS redirect below this line.
